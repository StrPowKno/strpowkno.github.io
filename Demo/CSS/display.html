<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Displays</title>
    <style>
        div {
            background-color: red;
            width: 100px;
            height: 100px;
            display: block; /* Doesnt do anything */
            
        }

        span{
            background-color: blue;
            width: 100px;
            height: 100px;
            display: block;
        }
    </style>
</head>
<body>
    <div>div</div>
    <span>span</span>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Dolor magni repellat aliquid obcaecati, aspernatur ea et dolorum porro nihil, necessitatibus dolore dolorem illum rem numquam iste placeat culpa, tempore suscipit?</p>
</body>
</html>




<!--

Display

display = property specifies if/how
          an element is displayed.


    block-level = start on a new line, take up the full width available
                  (h1, div, p, form, header, footer, etc)

                  Note: You can put attrs like width and height.

                  Note: in css and in the display attr, the block-level
                  value is "block" and not block-level


    inline = do not start on a new line, width is limited to what is needed.
             (span, a, img, etc)

             Note: Attributes like width and height dont apply


    inline-block = do not start a new line but width and height are changeable
        visibility = for inline-block, we can put a visbility such as:
        hidden,
        collapse and 
        visible
     


    none = doesnt display the element, as if its gone






-->
