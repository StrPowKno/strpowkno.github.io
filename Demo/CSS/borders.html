<!--

Border styles

Border styles kinds are:

solid
dotted
double
groove
ridge
inset
outset
none

Border size and XY

You can select and put rulesets for border bottom, top. left, right, etc
by using
border-SIDE: SIZEpx STYLE COLOR;


border-width (thickness) by default is 1px. 


Border color

color can be set by 
border-color
and can be set to hex, RGB, hsl and color names.


Border radius

The roundness of the border can be set by
border-radius

max radius is 20px


You can also use the 
border
attribute to set all of above at once (except radius)

example

border: 3px solid hsl(262, 100%, 56%);

so it would be

border: SIZEpx STYLE COLOR;



-->
