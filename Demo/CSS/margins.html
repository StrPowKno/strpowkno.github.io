<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margins</title>
    <style>
    
        p {
            margin: 10px;
        }

        .box {
            border: 5px solid;
            font-size: 5em;
            width: 250px;
            height: 250px;
        }

        #box1 {
            background-color: red;
            margin-left: 50px;
        }

        #box2{
            background-color: aqua;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>Margins</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Sequi blanditiis cupiditate voluptas architecto vero excepturi vel et placeat? Tempora aspernatur illum nemo iure et libero velit voluptatibus quasi dignissimos laboriosam?</p>
    <div class="box" id="box1">text</div>
    <div class="box" id="box2">text</div>


</body>
</html>




<!--

Margins

Margins are spaces between a element and the elements around it.

So a box (div) with a 20px margin would be:

(other elements)

     20px gap

+----------------+
|     Hello      |
+----------------+

     20px gap

(other elements)

and margin is used like this:

margin: AMOUNTpx;

and other types are

margin-left/right

and if you want to always have maximum margin automatically you can use auto as AMOUNT
like this:

margin-left: auto;



-->
