<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows</title>
    <style>
        h1 {
            text-shadow: 1px 1px 5px red;
        }
        #box1 {
            width: 200px;
            height: 100px;
            background-color: rgb(201, 201, 201);
            box-shadow: 2px 3px 5px;
        }
    </style>
</head>
<body>
    <h1>Shadows</h1>
    <div id="box1"> </div>
</body>
</html>




<!--
    Shadows


Text shadows

the shadow of a text can be edited by the 
text-shadow 
attribute.

The usage:

text-shadow: HORIZONTAL_OFFSET VERTICAL_OFFSET BLUR COLOR;

so an example would be 

text-shadow: 1px 1px 3px red;

so the shadow would be in 1px horizontal and vertical off,
and 3px of blurness,
and the shadow has a red color.

Box shadows

Basically the same thing as text shadows,
but the attribute is 
box-shadow


-->
