<!--

Overflow

overflow = property that sets the deisred
behavior when context doesn't fit in the  
parent element box (overflows)

overflow states:

overflow: visible; = if other elements overflow, allow it to do so. (default)

overflow: hidden; = any content that overflows, gets hidden. (doesnt show)
overflow: clip; = set how much you want the content to overflow.

also comes with the attr of
 overflow-clip-margin: AMOUNT;

this attr tells the browser that the content overflowing by AMOUNT
*Can* be showed

overflow: scroll; = first hides the content, gives us a scroll bar,
we can scroll both horizontally and vertically,
to see the hidden content. 

*Note*: the bar is always there, even if scrolling is impossible

overflow: auto; = Same as scroll but hides the scroll bar if
*not needed*. 







-->
