<!--Example of Hyperlinks-->

<a href="../index.html" target="_blank" title="goes to homepage"> anchor to index.html </a>

<!--href tag is for the link that opens-->
<!--target tag is used to specify where to open the link-->
<!--title shows a tooltip when hovering over the link-->

<!--example of anchor with picture:-->

<a href="../assets/pictures/download.png">
<img src="../assets/pictures/download.png" alt="random picture">
</a>


<!--

also: anything put in the <a> tag will have the specified link.

even if its a video, a image, a text, etc

-->
