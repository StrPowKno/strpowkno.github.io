<!--Example of how to show images in a html file-->

<img src="../assets/pictures/download.png" alt="a random image" title="random image">

<!--src tag is used to specify the path of the image-->
<!--alt tag is used to specify the alternative text for the image if it cannot be displayed-->
<!--title tag is used to specify the tooltip text when hovering over the image-->

<!--CSS tags for img:-->
<!--width and height can be used to specify the size of the image-->
<img src="../assets/pictures/download.png" width="200" height="200">
<!--object-fit can be used to specify how the image should be resized to fit the specified width and height-->

<!--we can also use JPG, PNG, WEBP, GIF (see bitmap images) and SVG (see vector images) files.-->
