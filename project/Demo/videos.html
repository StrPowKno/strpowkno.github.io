<!--Example Video in HTML-->

<video src="path/to/video" controls autoplay loop muted>
    
    <!--The tags avaiable for video are

    <video controls> to show the video controls

    <video autoplay> to play the video automatically when the page loads

    <video loop> to play the video in a loop

    <video muted> to mute the video by default

    -->

    <!--We also can add fallbacks like this-->
    
    <source src="path/to/video.mp4" type="video/mp4">

</video>



<!--Supported Video extentions:

type="video/mp4" for mp4 files

type="video/webm" for webm files

type="video/ogg" for ogg files

type="video/avi" for avi files

type="video/mpeg" for mpeg files

type="video/quicktime" for quicktime files

type="video/x-ms-wmv" for wmv files

type="video/x-flv" for flv files

and etc.

-->
