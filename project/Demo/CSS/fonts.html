<!--

Fonts

when using fonts in HTMLs, the browser might not support
the using font.

so when using font, we put font-family ruleset
and then put our main font first,
then our fallback fonts after that.


Font Sizes

when we use texts, we may want to change the size
so to change the font size you use the
font-size attr

people usually use 16px for their text.

the values can be in:
px = pixels
em = percent (kinda)


Font weight

you can change the weight of the font by putting rulesets for
font-weight.

values are between 100-900 and 
bold, bolder, normal, lighter


Font style

you can style fonts by the 
font-style attr.

font styles are:

italic
normal
oblique


Getting fonts from the web

You can get fonts by online servers.
The most-used/populer one is fonts.google.com

example of embbed css font:

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">


Getting fonts locally

You can link you own .ttf font files into html.

For internal css, you can do that by putting

<link rel="font" href="/path/to/font">

-->
